bio: |
  I develop predictive theories of 
  condensed matter materials and propose them for experimentalists to
  make. My work pairs first-principles calculations with group- and
  spin-symmetry analysis to discover new classes of materials with interesting
  electronic and magnetic properties. Specific material class of interests 
  include semicondcutors and ferroic materials, most prominently 
  *non-relativistic spin split antiferromagnets*, a family of compensated 
  magnets with ferromagnet-like spin-split bands. My recent interest extends to 
  integrating these methods into agentic workflows to accelerate materials discovery.

  I moved to Evanston in May 2023 to join the Rondinelli Group at Northwestern University
  as a research associate.

